  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r(--muted);font-weight:400;line-height:1.28;margin-top:20px;text-wrap:pretty}\n.lead{font-size:36px;color:var(--ink);line-height:1.42;text-wrap:pretty}\n.head{margin-bottom:34px;flex:none}\n.fill{flex:1}\n\n.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:40px 44px;display:flex;flex-direction:column}\n.card .ch{font-size:38px;font-weight:750;color:var(--ink);margin-bottom:14px;line-height:1.1;flex:none}\n.card .cb{font-size:31px;color:var(--muted);line-height:1.45;text-wrap:pretty;flex:1}\n.num{font-family:var(--mono);font-size:27px;color:var(--brand);font-weight:700;margin-bottom:10px;flex:none}\n\n.chip{display:inline-flex;align-items:center;gap:12px;font-family:var(--mono);font-size:26px;color:var(--ink);border:1px solid var(--line2);border-radius:999px;padding:10px 22px;background:rgba(255,255,255,.025)}\n.dot{width:14px;height:14px;border-radius:50%;flex:none}\n.d-ok{background:var(--ok)}.d-watch{background:var(--watch)}.d-alert{background:var(--alert)}\n\n.g2{display:grid;grid-template-columns:1fr 1fr;gap:34px}\n.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}\n.g3r{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;gap:28px}\n\n.tbl{width:100%;border-collapse:collapse}\n.tbl th{text-align:left;font-family:var(--mono);font-size:26px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:0 28px 22px}\n.tbl td{padding:20px 28px;border-top:1px solid var(--line);vertical-align:top;font-size:29px;color:var(--ink);line-height:1.38}\n.tbl td.f{font-weight:700;white-space:nowrap;width:32%}\n.tbl tr:first-child td{border-top:none}\n\n.flow{display:flex;align-items:stretch;gap:0}\n.node{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:34px 34px;border-top:5px solid var(--line);display:flex;flex-direction:column}\n.node.a{border-top-color:var(--watch)}.node.b{border-top-color:var(--ok)}.node.c{border-top-color:var(--info)}\n.node .nt{font-size:34px;font-weight:750;color:var(--ink);margin-bottom:6px}\n.node .ntag{font-family:var(--mono);font-size:27px;color:var(--muted);margin-bottom:22px}\n.node ul{list-style:none;display:flex;flex-direction:column;gap:14px;flex:1}\n.node li{font-size:28px;color:var(--muted);line-height:1.3;padding-left:24px;position:relative}\n.node li::before{content:\"\";position:absolute;left:0;top:13px;width:9px;height:9px;border-radius:50%;background:var(--faint)}\n.conn{width:130px;flex:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:0 4px}\n.conn .lbl{font-family:var(--mono);font-size:26px;color:var(--muted);text-align:center;line-height:1.2}\n.conn .arr{position:relative;width:80%;height:2px;background:var(--line2)}\n.conn .arr::after{content:\"\";position:absolute;right:-1px;top:-7px;border-left:15px solid var(--line2);border-top:9px solid transparent;border-bottom:9px solid transparent}\n.retn{display:flex;align-items:center;gap:18px;background:rgba(246,166,35,.06);border:1px solid rgba(246,166,35,.28);border-radius:14px;padding:20px 30px;margin-top:22px;flex:none}\n.retn .ar{font-family:var(--mono);font-size:32px;color:var(--brand)}\n.retn .rt{font-size:29px;color:var(--ink);line-height:1.3}\n.json{font-family:var(--mono);font-size:26px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:26px 30px;line-height:1.5;white-space:pre-wrap;margin-top:22px;flex:none}\n.json b{color:var(--ok);font-weight:600}\n\n.zone{border:1px solid var(--line2);border-radius:18px;padding:34px 38px;background:var(--panel);flex:1}\n.zone.ok{border-color:rgba(62,207,142,.5);box-shadow:0 0 0 1px rgba(62,207,142,.18),0 28px 56px rgba(0,0,0,.35)}\n.zone.alert{border-color:rgba(239,93,96,.6);box-shadow:0 0 0 1px rgba(239,93,96,.22),0 28px 56px rgba(239,93,96,.1)}\n.zone .zh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}\n.zone .zn{font-size:34px;font-weight:700}\n.zone .zs{font-family:var(--mono);font-size:29px;font-weight:700;display:flex;align-items:center;gap:10px}\n.zone .zr{font-family:var(--mono);font-size:30px;color:var(--muted);line-height:1.85}\n.zone .zr b{color:var(--ink);font-weight:600}\n.baarrow{font-size:64px;color:var(--brand);line-height:1;flex:none;align-self:center}\n\n.shot{border:1px solid var(--line2);border-radius:16px;overflow:hidden;background:var(--panel);box-shadow:0 44px 88px rgba(0,0,0,.55)}\n.shot-bar{height:44px;display:flex;align-items:center;gap:10px;padding:0 20px;background:var(--panel2);border-bottom:1px solid var(--line)}\n.shot-bar i{width:14px;height:14px;border-radius:50%;background:var(--faint);display:block}\n\n.hzicon{width:96px;height:96px;margin-bottom:8px;flex:none}\n\n.progress{position:fixed;top:0;left:0;right:0;height:4px;background:rgba(255,255,255,.06);z-index:60}\n#progFill{height:100%;background:var(--brand);width:7.1%;transition:width .4s ease}\n.nav{position:fixed;right:18px;bottom:16px;display:flex;align-items:center;gap:5px;z-index:60;background:rgba(18,24,32,.88);backdrop-filter:blur(12px);border:1px solid var(--line2);border-radius:999px;padding:5px 7px}\n.nav button{width:32px;height:32px;border-radius:50%;border:1px solid var(--line2);background:transparent;color:var(--ink);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s}\n.nav button:hover{background:rgba(255,255,255,.08);border-color:var(--brand)}\n.nav .counter{font-family:var(--mono);font-size:16px;color:var(--muted);padding:0 8px;min-width:56px;text-align:center}\n.nav .counter b{color:var(--ink)}\n.nav .npill{width:auto;border-radius:999px;padding:0 12px;font-family:var(--mono);font-size:15px}\n.demo-btn{display:inline-flex;align-items:center;font-family:var(--mono);font-size:15px;font-weight:700;color:#0d1117;background:var(--ok);border:none;border-radius:999px;padding:0 14px;height:32px;text-decoration:none;cursor:pointer;white-space:nowrap;letter-spacing:.04em;transition:background .15s}\n.demo-btn:hover{background:#53d99e}\n\n.notes{position:fixed;left:0;right:0;bottom:0;z-index:70;transform:translateY(102%);transition:transform .32s cubic-bezier(.2,.7,.2,1);background:rgba(11,15,21,.96);backdrop-filter:blur(16px);border-top:1px solid var(--line2)}\n.notes.open{transform:translateY(0)}\n.notes-inner{max-width:1500px;margin:0 auto;padding:28px 44px 36px}\n.notes-label{font-family:var(--mono);font-size:22px;letter-spacing:.18em;text-transform:uppercase;color:var(--brand);margin-bottom:16px}\n#notesBody{font-size:28px;line-height:1.52;color:var(--ink);text-wrap:pretty}\n\n.anim{opacity:0;transform:translateY(22px);transition:opacity .5s cubic-bezier(.2,.7,.2,1),transform .5s cubic-bezier(.2,.7,.2,1)}\n.slide.active .anim{opacity:1;transform:none}\n\n@keyframes spin{to{transform:rotate(360deg)}}\n@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,93,96,.55)}55%{box-shadow:0 0 0 14px rgba(239,93,96,0)}}\n<\u002Fstyle>\n\n<script type=\"application/json\" id=\"speaker-notes\">[\"Open with the promise: free, open-source AI that watches a mine, spots danger, explains it in plain English, and acts, all offline for $0. Cursor Hackathon Sudbury, Track 03. Built by Mihir Trivedi and Dhruv Devani. The software is live right now at mtrivedilu.github.io/OreAcle.\",\"Two km down you cannot see the sky. Three quiet killers: bad air (CO and NO2 and oxygen drop), failing equipment (vibration days before failure), wasted ventilation (40% or more of the energy bill). One supervisor watches dozens of readings across many zones for a whole shift. The mine measures everything. It just does not understand, explain, or act on it fast enough.\",\"Ground it in Sudbury. Maestro Vigilante AQS has run in Vale since 2015, now 70 plus mines. Creighton sits about 2,400 m deep. Newtrax and Sandvik expanded at Glencore Raglan and Kamoto Copper in July 2025. Vale IROC runs all five Ontario mines from surface: per Vale's chief ventilation engineer, VOD saves millions. Accutron MAQS too. The sensors exist. The intelligent layer on top does not.\",\"Two gaps. First: the AI interpretation layer is thin. Numbers to decisions still happens in a human's head or as an expensive vendor add-on. Second: the interface is built for engineers, not the person on shift. Maestro and Newtrax have the eyes and muscles. OreAcle is the open-source, zero-cost brain and friendly face.\",\"Four jobs. Sense: the Pico W reads real sensors and streams over USB. Think: Isolation Forest plus hard threshold rules catches danger. Explain: a local LLM turns each anomaly into plain-English with a recommended action. Act: Ventilation-on-Demand picks fan speed and sends it back to the board. A real closed loop.\",\"One data contract end to end. Edge node to Brain to Dashboard, and the fan setpoint loops back to the board. Every stage speaks the same JSON, about two per second. That is why the simulator swaps for real sensors with no rewrite of the brain or the UI.\",\"Two kinds of AI. Classical ML, Isolation Forest from scikit-learn, catches abnormal combinations no single threshold would catch. Local LLM, Llama 3.2 3B via Ollama, explains and advises in plain English and powers the copilot. Both open-source, local, $0. Offline is itself a selling point underground.\",\"DEMO, 3 to 4 minutes. Open the console on your phone or laptop right now: m-t-r-i-v-e-d-i-L-U dot github dot i-o slash OreAcle. I will trigger Gas Buildup: watch Zone 3 flip from green to red, CO climb, the AI alert appear, and the fan go to 95%. Type into the copilot: Which zones are unsafe and why? It answers from live data, offline. You can trigger it yourself.\",\"This is a real Raspberry Pi Pico W, about $10. I turn this potentiometer and you will see the airflow value change live in the console. As it crosses the threshold the status flips from OK to WATCH to ALERT and the fan percentage follows. Real sensor input, real USB serial, real backend response. To be clear: physical gas sensors, a real fan motor, and the underground enclosure are next steps. But the data contract is proven real today.\",\"Be honest about status. Software brain is complete and live: four-zone sim, real-time WebSocket, anomaly detection, VOD logic, plain-English alert feed, copilot, SQLite, full dashboard on GitHub Pages. Hardware proof is done: Pico W streams in OreAcle format over USB, potentiometer proves real sensor input drives status and fan response. Multi-sensor integration and physical fan are in progress.\",\"Map straight to judging. Real problem tied to Vale and Glencore. Real ML plus real LLM plus closed loop, not slideware. Two kinds of AI. Live demo judges can open and trigger themselves. A usable UI the industry actually lacks. Key Logic's exact business model. $0 AI bill, viable today. Credible with named companies and a Sudbury mining resume.\",\"$0 AI bill on hardware mines already own. Fully offline for poor connectivity and sensitive data. Open-source and vendor-neutral across Maestro, Newtrax, and Accutron sensors. That is Key Logic's exact business: software wrapped around mining hardware. It drops onto the networks Vale and Glencore already run.\",\"Mihir Trivedi and Dhruv Devani. LoopX: real-time underground safety dashboards. Vale via Minax: offline-first underground inspection app. Laurentian MERC: Random Forest ML published in Ore Geology Reviews. Flosonics: LLM assistant over operational data. OreAcle is the intersection of all four, built in one hackathon with Cursor.\",\"Three asks. Open the live console right now and trigger an alarm yourself. Watch the three-minute YouTube demo if you prefer. And if you want to talk about what OreAcle could do for a real Sudbury mine, I am right here. Working software, open-source, ready today.\"]<\u002Fscript>\n<\u002Fhelmet>\n\n\n\n<div class=\"deck-root\">\n  <div class=\"progress\"><div id=\"progFill\"><\u002Fdiv><\u002Fdiv>\n  <div id=\"stage\">\n\n    <!-- 1. TITLE -->\n    <section class=\"slide active\" data-screen-label=\"01 Title\">\n      <div class=\"pad\" style=\"justify-content:center\">\n        <div style=\"display:grid;grid-template-columns:1fr .98fr;gap:80px;align-items:center;width:100%\">\n          <div>\n            <div class=\"kicker anim\">Cursor Hackathon Sudbury 2026 · Track 03<\u002Fdiv>\n            <div class=\"title-xl anim\" style=\"transition-delay:90ms\">OreAcle<\u002Fdiv>\n            <div class=\"sub anim\" style=\"transition-delay:170ms\">The offline AI oracle for underground mine intelligence.<\u002Fdiv>\n            <p class=\"lead anim\" style=\"transition-delay:250ms;margin-top:28px;color:var(--muted);max-width:860px\">Free, open-source AI safety and ventilation for underground mines. Proven end to end, from a real sensor to a real action, for <b style=\"color:var(--ink)\">$0 in AI cost<\u002Fb>.<\u002Fp>\n            <div class=\"anim\" style=\"transition-delay:330ms;display:flex;gap:14px;margin-top:38px;flex-wrap:wrap\">\n              <span class=\"chip\"><span class=\"dot d-ok\"><\u002Fspan>$0 AI COST<\u002Fspan>\n              <span class=\"chip\"><span class=\"dot d-ok\"><\u002Fspan>100% OFFLINE<\u002Fspan>\n              <span class=\"chip\"><span class=\"dot d-ok\"><\u002Fspan>OPEN SOURCE<\u002Fspan>\n              <span class=\"chip\"><span class=\"dot d-ok\"><\u002Fspan>MVP LIVE NOW<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"anim\" style=\"transition-delay:410ms;margin-top:34px;font-family:var(--mono);font-size:27px;color:var(--muted)\">Mihir Trivedi and Dhruv Devani · mtrivedilu.github.io/OreAcle<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"shot anim\" style=\"transition-delay:270ms\">\n            <div class=\"shot-bar\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n            <img src=\"67f5a907-fafe-4972-a796-ecb34098094d\" alt=\"OreAcle operator console, all zones OK\" style=\"display:block;width:100%;height:auto\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 2. PROBLEM -->\n    <section class=\"slide\" data-screen-label=\"02 Problem\">\n      <div class=\"pad\">\n        <div class=\"head\">\n          <div class=\"kicker anim\">The Problem<\u002Fdiv>\n          <h1 class=\"title anim\" style=\"transition-delay:80ms\">Two kilometres down, three hazards stay quiet<\u002Fh1>\n        <\u002Fdiv>\n        <div class=\"g3 fill anim\" style=\"transition-delay:150ms\">\n          <div class=\"card\" style=\"border-top:5px solid var(--alert)\">\n            <svg class=\"hzicon\" viewBox=\"0 0 96 96\" fill=\"none\" stroke=\"var(--alert)\" stroke-width=\"3.2\" stroke-linecap=\"round\"><circle cx=\"48\" cy=\"54\" r=\"24\"><\u002Fcircle><circle cx=\"39\" cy=\"50\" r=\"4.5\" fill=\"var(--alert)\" stroke=\"none\"><\u002Fcircle><circle cx=\"57\" cy=\"56\" r=\"4.5\" fill=\"var(--alert)\" stroke=\"none\"><\u002Fcircle><circle cx=\"48\" cy=\"64\" r=\"4.5\" fill=\"var(--alert)\" stroke=\"none\"><\u002Fcircle><path d=\"M30 30 Q48 16 66 30\"><\u002Fpath><path d=\"M36 22 Q48 10 60 22\"><\u002Fpath><\u002Fsvg>\n            <div class=\"ch\">Bad air<\u002Fdiv>\n            <div class=\"cb\">Diesel exhaust produces CO and NO2. Blasting leaves toxic gases and dust. Oxygen drops without warning. A worker often cannot smell or feel the danger until it is already serious.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"card\" style=\"border-top:5px solid var(--watch)\">\n            <svg class=\"hzicon\" viewBox=\"0 0 96 96\" fill=\"none\" stroke=\"var(--watch)\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"48\" cy=\"48\" r=\"28\"><\u002Fcircle><polyline points=\"32,48 40,33 48,62 56,33 64,48\"><\u002Fpolyline><\u002Fsvg>\n            <div class=\"ch\">Failing equipment<\u002Fdiv>\n            <div class=\"cb\">A pump, fan, or drill vibrates differently days before it fails. If nobody catches the pattern it fails catastrophically. The signal is already in the data. Nobody is reading it.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"card\" style=\"border-top:5px solid var(--ok)\">\n            <svg class=\"hzicon\" viewBox=\"0 0 96 96\" fill=\"var(--ok)\"><g style=\"transform-origin:48px 48px;animation:spin 7s linear infinite\"><ellipse cx=\"48\" cy=\"28\" rx=\"8.5\" ry=\"18\"><\u002Fellipse><ellipse cx=\"48\" cy=\"28\" rx=\"8.5\" ry=\"18\" transform=\"rotate(120 48 48)\"><\u002Fellipse><ellipse cx=\"48\" cy=\"28\" rx=\"8.5\" ry=\"18\" transform=\"rotate(240 48 48)\"><\u002Fellipse><\u002Fg><circle cx=\"48\" cy=\"48\" r=\"10\" fill=\"var(--bg)\"><\u002Fcircle><circle cx=\"48\" cy=\"48\" r=\"6\" fill=\"var(--ok)\"><\u002Fcircle><\u002Fsvg>\n            <div class=\"ch\">Wasted ventilation<\u002Fdiv>\n            <div class=\"cb\">Ventilation is 40% or more of a mine's energy bill. Fans full blast everywhere waste millions. Too little air where people work is a safety crisis. Smarter control saves both.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card anim\" style=\"transition-delay:330ms;flex:none;margin-top:28px;background:rgba(246,166,35,.05);border-color:rgba(246,166,35,.2);padding:28px 44px\">\n          <p class=\"lead\" style=\"font-size:33px\">The mine measures everything. It just is not <b style=\"color:var(--ink)\">understood<\u002Fb> fast enough, <b style=\"color:var(--ink)\">explained<\u002Fb> clearly enough, or <b style=\"color:var(--ink)\">acted on<\u002Fb> automatically enough.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 3. INDUSTRY TODAY -->\n    <section class=\"slide\" data-screen-label=\"03 Industry today\">\n      <div class=\"pad\">\n        <div class=\"head\">\n          <div class=\"kicker anim\">The Industry Today<\u002Fdiv>\n          <h1 class=\"title anim\" style=\"transition-delay:80ms\">The sensors already exist<\u002Fh1>\n        <\u002Fdiv>\n        <div class=\"g2 fill anim\" style=\"transition-delay:150ms;grid-template-rows:1fr 1fr\">\n          <div class=\"card\"><div class=\"ch\">Maestro Digital Mine<\u002Fdiv><div class=\"cb\">Vigilante AQS air-quality stations have run in Vale since 2015, now in 70 plus mines globally. Creighton Mine sits about 2,400 m deep. Pioneered Ventilation-on-Demand commercially.<\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><div class=\"ch\">Newtrax / Sandvik + Glencore<\u002Fdiv><div class=\"cb\">Mining Data Platform watches people, equipment and environment, vendor-agnostic. July 2025: Sandvik and Glencore expanded Newtrax collision avoidance at Raglan (Canada) and Kamoto Copper (DRC).<\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><div class=\"ch\">Vale IROC, Sudbury<\u002Fdiv><div class=\"cb\">Since 2024 the Integrated Remote Operations Centre oversees all five Vale Ontario underground mines from surface with VOD that, per Vale's chief ventilation engineer, saves \"millions of dollars.\"<\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><div class=\"ch\">Accutron Instruments<\u002Fdiv><div class=\"cb\">The MAQS Mine Air Quality Station is a commercial gas and air-quality system used across Northern Ontario mines, another example of world-class sensor hardware already in the ground.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"lead anim\" style=\"transition-delay:330ms;flex:none;margin-top:28px;font-size:32px;color:var(--muted)\">Sudbury is world-class at collecting mine data. <b style=\"color:var(--ink)\">OreAcle does not compete with them. It completes them.<\u002Fb><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 4. THE GAP -->\n    <section class=\"slide\" data-screen-label=\"04 The gap\">\n      <div class=\"pad\">\n        <div class=\"head\">\n          <div class=\"kicker anim\">The Gap<\u002Fdiv>\n          <h1 class=\"title anim\" style=\"transition-delay:80ms\">Data is not decisions<\u002Fh1>\n        <\u002Fdiv>\n        <div class=\"g2 fill anim\" style=\"transition-delay:160ms\">\n          <div class=\"card\" style=\"border-top:5px solid var(--watch)\">\n            <div class=\"num\">Gap 01<\u002Fdiv>\n            <div class=\"ch\">The AI interpretation layer is thin<\u002Fdiv>\n            <div class=\"cb\">Systems measure and display well. The leap from \"here are the numbers\" to \"here is what is wrong, why, and what to do right now\" still happens in a human's head, or is sold as an expensive add-on upgrade.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"card\" style=\"border-top:5px solid var(--info)\">\n            <div class=\"num\">Gap 02<\u002Fdiv>\n            <div class=\"ch\">The interface is built for engineers<\u002Fdiv>\n            <div class=\"cb\">Dense dashboards assume you know what \"38 ppm CO at 0.4 airflow\" means. The frontline worker needs something clear: green, amber, red, what is happening, what to do, one action.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card anim\" style=\"transition-delay:340ms;flex:none;margin-top:28px;background:rgba(246,166,35,.06);border-color:rgba(246,166,35,.28);padding:32px 44px\">\n          <p class=\"lead\" style=\"font-size:35px\">Vale and Glencore have the <b style=\"color:var(--watch)\">eyes<\u002Fb> (sensors) and the <b style=\"color:var(--watch)\">muscles<\u002Fb> (automation). OreAcle is the open-source, zero-cost <b style=\"color:var(--ink)\">brain and friendly face<\u002Fb> that connects them.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 5. SOLUTION -->\n    <section class=\"slide\" data-screen-label=\"05 Solution\">\n      <div class=\"pad\">\n        <div class=\"head\">\n          <div class=\"kicker anim\">The Solution<\u002Fdiv>\n          <h1 class=\"title anim\" style=\"transition-delay:80ms\">Sense. Think. Explain. Act.<\u002Fh1>\n        <\u002Fdiv>\n        <div class=\"g2 fill anim\" style=\"transition-delay:150ms;grid-template-rows:1fr 1fr\">\n          <div class=\"card\" style=\"border-top:5px solid var(--info)\">\n            <div class=\"num\">01 · Sense<\u002Fdiv>\n            <div class=\"ch\">Read the zone<\u002Fdiv>\n            <div class=\"cb\">A Raspberry Pi Pico W reads vibration, temperature, humidity and occupancy and streams them over USB serial. Gas values are injected in software; a real $10 gas sensor is a one-wire swap.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"card\" style=\"border-top:5px solid var(--watch)\">\n            <div class=\"num\">02 · Think<\u002Fdiv>\n            <div class=\"ch\">Spot the danger<\u002Fdiv>\n            <div class=\"cb\">An Isolation Forest (scikit-learn) watches every channel together and flags abnormal combinations. A safety rules engine checks hard thresholds such as CO limits and heat-stress levels.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"card\" style=\"border-top:5px solid var(--brand)\">\n            <div class=\"num\">03 · Explain<\u002Fdiv>\n            <div class=\"ch\">Say it in plain English<\u002Fdiv>\n            <div class=\"cb\">A local LLM (Ollama, Llama 3.2 3B, offline, $0) turns each anomaly into a short alert with the action and the reason, and powers a chat copilot that answers operator questions.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"card\" style=\"border-top:5px solid var(--ok)\">\n            <div class=\"num\">04 · Act<\u002Fdiv>\n            <div class=\"ch\">Close the loop<\u002Fdiv>\n            <div class=\"cb\">Ventilation-on-Demand picks the fan speed from occupancy plus air quality and sends the command back to the board. A real, visible closed loop: sense to think to act.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 6. ARCHITECTURE -->\n    <section class=\"slide\" data-screen-label=\"06 Architecture\">\n      <div class=\"pad\">\n        <div class=\"head\" style=\"margin-bottom:28px\">\n          <div class=\"kicker anim\">System Architecture<\u002Fdiv>\n          <h1 class=\"title anim\" style=\"transition-delay:80ms;font-size:72px\">One data contract, end to end<\u002Fh1>\n        <\u002Fdiv>\n        <div class=\"flow fill anim\" style=\"transition-delay:160ms\">\n          <div class=\"node a\">\n            <div class=\"nt\">Edge Node<\u002Fdiv><div class=\"ntag\">Pico W · MicroPython<\u002Fdiv>\n            <ul>\n              <li>MPU6050: vibration and tilt<\u002Fli>\n              <li>DHT11: temperature, humidity<\u002Fli>\n              <li>Ultrasonic and PIR: occupancy<\u002Fli>\n              <li>Buzzer, RGB LED, LCD: local alarm<\u002Fli>\n              <li>DC fan and servo louver<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div class=\"conn\"><div class=\"lbl\">JSON over<br>USB serial<\u002Fdiv><div class=\"arr\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"node b\">\n            <div class=\"nt\">The Brain<\u002Fdiv><div class=\"ntag\">laptop · all local · $0 AI<\u002Fdiv>\n            <ul>\n              <li>Ingest via pyserial into SQLite<\u002Fli>\n              <li>Isolation Forest anomaly detection<\u002Fli>\n              <li>Safety rules and VOD control<\u002Fli>\n              <li>Ollama LLM (Llama 3.2 3B)<\u002Fli>\n              <li>FastAPI and WebSocket server<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div class=\"conn\"><div class=\"lbl\">WebSocket<br>(two-way)<\u002Fdiv><div class=\"arr\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"node c\">\n            <div class=\"nt\">Operator Dashboard<\u002Fdiv><div class=\"ntag\">React web UI<\u002Fdiv>\n            <ul>\n              <li>Live gauges and zone map<\u002Fli>\n              <li>AI alert feed in plain English<\u002Fli>\n              <li>AI copilot chat<\u002Fli>\n              <li>Ventilation control and fan view<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"retn anim\" style=\"transition-delay:290ms\"><span class=\"ar\">←<\u002Fspan><span class=\"rt\"><b style=\"color:var(--brand)\">Closed loop:<\u002Fb> the Brain sends the fan setpoint back to the Edge Node, completing sense to think to act.<\u002Fspan><\u002Fdiv>\n        <div class=\"json anim\" style=\"transition-delay:370ms\">{ <b>\"ts\"<\u002Fb>:1750550400, <b>\"zone\"<\u002Fb>:\"Z3\", <b>\"vib_rms\"<\u002Fb>:0.07, <b>\"temp_c\"<\u002Fb>:24.1, <b>\"occupancy\"<\u002Fb>:2,\n  <b>\"co_ppm\"<\u002Fb>:12, <b>\"no2_ppm\"<\u002Fb>:0.4, <b>\"airflow\"<\u002Fb>:0.42, <b>\"fan_pct\"<\u002Fb>:40 }   // co / no2 / airflow are SIM<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 7. AI STACK -->\n    <section class=\"slide\" data-screen-label=\"07 AI stack\">\n      <div class=\"pad\">\n        <div class=\"head\">\n          <div class=\"kicker anim\">The AI Stack<\u002Fdiv>\n          <h1 class=\"title anim\" style=\"transition-delay:80ms\">Two kinds of AI, working together<\u002Fh1>\n        <\u002Fdiv>\n        <div class=\"g2 fill anim\" style=\"transition-delay:160ms\">\n          <div class=\"card\" style=\"border-top:5px solid var(--ok)\">\n            <div class=\"num\" style=\"color:var(--ok);font-size:29px\">Classical ML · Detection<\u002Fdiv>\n            <div class=\"ch\">scikit-learn Isolation Forest<\u002Fdiv>\n            <div class=\"cb\">Tiny, instant, explainable. Watches all sensor channels together and flags \"this combination is abnormal\" even when no single value crossed a hard limit. No cloud, no GPU, no cost. Backed by threshold rules for known safety limits.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"card\" style=\"border-top:5px solid var(--brand)\">\n            <div class=\"num\" style=\"font-size:29px\">Generative AI · Explanation<\u002Fdiv>\n            <div class=\"ch\">Ollama · Llama 3.2 3B<\u002Fdiv>\n            <div class=\"cb\">Turns each anomaly into a short plain-English alert with a recommended action, and answers operator questions in natural language over recent sensor data. Runs fully offline on a laptop. faster-whisper adds optional voice input.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card anim\" style=\"transition-delay:340ms;flex:none;margin-top:28px;background:rgba(62,207,142,.06);border-color:rgba(62,207,142,.28);padding:30px 44px\">\n          <p class=\"lead\" style=\"font-size:34px\">Everything runs locally: <b style=\"color:var(--ok)\">no API keys, no internet required, $0 cost.<\u002Fb> Being offline is itself a selling point underground, where connectivity is poor and data is sensitive.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 8. LIVE DEMO -->\n    <section class=\"slide\" data-screen-label=\"08 Live demo\">\n      <div class=\"pad\">\n        <div class=\"head\">\n          <div class=\"kicker anim\" style=\"display:flex;align-items:center;gap:14px\"><span class=\"dot d-alert\" style=\"animation:pulse 1.4s ease infinite\"><\u002Fspan>Live Demo<\u002Fdiv>\n          <h1 class=\"title anim\" style=\"transition-delay:80ms\">Open it right now<\u002Fh1>\n        <\u002Fdiv>\n        <div class=\"g2 fill anim\" style=\"transition-delay:160ms\">\n          <div style=\"display:flex;flex-direction:column;gap:28px\">\n            <div class=\"card\" style=\"border-top:5px solid var(--ok);flex:none\">\n              <div class=\"num\" style=\"color:var(--ok)\">Live console<\u002Fdiv>\n              <div style=\"font-family:var(--mono);font-size:33px;color:var(--ok);font-weight:700;margin-top:8px;letter-spacing:-.01em\">mtrivedilu.github.io/OreAcle<\u002Fdiv>\n              <div style=\"font-family:var(--mono);font-size:27px;color:var(--muted);margin-top:6px\">#/console<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"card\" style=\"border-top:5px solid var(--alert);flex:none\">\n              <div class=\"num\" style=\"color:var(--alert)\">Demo video (3 min)<\u002Fdiv>\n              <div style=\"font-family:var(--mono);font-size:33px;color:var(--alert);font-weight:700;margin-top:8px\">youtu.be/yd7dnXjNt_4<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"card\" style=\"flex:1;background:rgba(246,166,35,.05);border-color:rgba(246,166,35,.2)\">\n              <div class=\"ch\" style=\"font-size:32px\">Trigger this yourself<\u002Fdiv>\n              <div class=\"cb\" style=\"font-size:29px\">Hit \"Gas Buildup\" in the simulator panel. Watch the zone flip, the AI alert appear, and the fan climb to 95%. Ask the copilot anything.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:20px;justify-content:center\">\n            <div style=\"display:flex;align-items:center;gap:22px\">\n              <div class=\"zone ok\">\n                <div class=\"zh\"><span class=\"zn\">Stope 3<\u002Fspan><span class=\"zs\" style=\"color:var(--ok)\">OK <span class=\"dot d-ok\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n                <div class=\"zr\">CO <b>13<\u002Fb> ppm · NO2 <b>1.8<\u002Fb> ppm<br>Airflow <b>0.42<\u002Fb> · Fan <b>45%<\u002Fb><\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"baarrow\">➞<\u002Fdiv>\n              <div class=\"zone alert\">\n                <div class=\"zh\"><span class=\"zn\">Stope 3<\u002Fspan><span class=\"zs\" style=\"color:var(--alert)\">ALERT <span class=\"dot d-alert\" style=\"animation:pulse 1.4s ease infinite\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n                <div class=\"zr\">CO <b style=\"color:var(--alert)\">47<\u002Fb> ppm · NO2 <b style=\"color:var(--alert)\">5.1<\u002Fb> ppm<br>Airflow <b>0.29<\u002Fb> · Fan <b style=\"color:var(--ok)\">95%<\u002Fb><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"card\" style=\"flex:none;background:rgba(239,93,96,.06);border-color:rgba(239,93,96,.28);padding:28px 36px\">\n              <div style=\"font-family:var(--mono);font-size:24px;color:var(--alert);margin-bottom:10px;letter-spacing:.06em\">AI ALERT · ZONE 3<\u002Fdiv>\n              <div style=\"font-size:28px;color:var(--ink);line-height:1.42\">CO at 47 ppm exceeds the 35 ppm limit. Two workers present. Fan raised to 95%. Evacuate if CO does not fall within 5 minutes.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 9. HARDWARE PROOF -->\n    <section class=\"slide\" data-screen-label=\"09 Hardware proof\">\n      <div class=\"pad\">\n        <div class=\"head\">\n          <div class=\"kicker anim\">Hardware Proof<\u002Fdiv>\n          <h1 class=\"title anim\" style=\"transition-delay:80ms\">Real sensor, real response<\u002Fh1>\n        <\u002Fdiv>\n        <div class=\"g2 fill anim\" style=\"transition-delay:160ms\">\n          <div style=\"display:flex;flex-direction:column;gap:24px\">\n            <div class=\"card\" style=\"border-top:5px solid var(--ok);flex:none\">\n              <div class=\"num\" style=\"color:var(--ok)\">Proven today<\u002Fdiv>\n              <div class=\"ch\" style=\"font-size:34px\">Pico W + potentiometer<\u002Fdiv>\n              <ul style=\"list-style:none;display:flex;flex-direction:column;gap:12px;margin-top:4px\">\n                <li style=\"font-size:30px;color:var(--muted);padding-left:24px;position:relative\"><span style=\"position:absolute;left:0;top:12px;width:9px;height:9px;border-radius:50%;background:var(--ok);display:block\"><\u002Fspan>Pico W streams live OreAcle-format readings over USB serial<\u002Fli>\n                <li style=\"font-size:30px;color:var(--muted);padding-left:24px;position:relative\"><span style=\"position:absolute;left:0;top:12px;width:9px;height:9px;border-radius:50%;background:var(--ok);display:block\"><\u002Fspan>Potentiometer knob sets airflow value in real time<\u002Fli>\n                <li style=\"font-size:30px;color:var(--muted);padding-left:24px;position:relative\"><span style=\"position:absolute;left:0;top:12px;width:9px;height:9px;border-radius:50%;background:var(--ok);display:block\"><\u002Fspan>Crossing thresholds triggers OK, WATCH, ALERT in the live dashboard<\u002Fli>\n                <li style=\"font-size:30px;color:var(--muted);padding-left:24px;position:relative\"><span style=\"position:absolute;left:0;top:12px;width:9px;height:9px;border-radius:50%;background:var(--ok);display:block\"><\u002Fspan>Fan percentage responds to the signal automatically<\u002Fli>\n              <\u002Ful>\n            <\u002Fdiv>\n            <div class=\"card\" style=\"border-top:5px solid var(--watch);flex:none\">\n              <div class=\"num\">In progress<\u002Fdiv>\n              <div class=\"cb\" style=\"flex:none;font-size:28px\">Physical DHT11 and MPU6050 sensors, DC fan motor, underground-ready enclosure. Same data contract: real sensors replace simulated values with no change to the brain or the UI.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:20px;justify-content:center\">\n            <div style=\"background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:36px 40px\">\n              <div style=\"font-family:var(--mono);font-size:24px;color:var(--muted);margin-bottom:28px;letter-spacing:.1em\">HARDWARE FLOW<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:0;margin-bottom:32px\">\n                <div style=\"background:rgba(246,166,35,.1);border:2px solid var(--watch);border-radius:14px;padding:22px 28px;text-align:center;flex:1\">\n                  <div style=\"font-family:var(--mono);font-size:26px;color:var(--watch);font-weight:700\">PICO W<\u002Fdiv>\n                  <div style=\"font-size:24px;color:var(--muted);margin-top:6px\">~$10 board<\u002Fdiv>\n                  <div style=\"margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px\">\n                    <svg width=\"36\" height=\"36\" viewBox=\"0 0 36 36\" fill=\"none\"><circle cx=\"18\" cy=\"18\" r=\"14\" stroke=\"var(--watch)\" stroke-width=\"2.5\"><\u002Fcircle><line x1=\"18\" y1=\"18\" x2=\"18\" y2=\"7\" stroke=\"var(--watch)\" stroke-width=\"2.5\" stroke-linecap=\"round\" transform=\"rotate(40 18 18)\"><\u002Fline><circle cx=\"18\" cy=\"18\" r=\"3\" fill=\"var(--watch)\"><\u002Fcircle><\u002Fsvg>\n                    <span style=\"font-size:23px;color:var(--muted)\">potentiometer<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"padding:0 16px;text-align:center;flex:none\">\n                  <div style=\"font-family:var(--mono);font-size:22px;color:var(--muted)\">USB Serial<\u002Fdiv>\n                  <div style=\"font-size:30px;color:var(--line2);margin:4px 0\">→<\u002Fdiv>\n                  <div style=\"font-family:var(--mono);font-size:20px;color:var(--faint)\">JSON 2/s<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background:rgba(62,207,142,.09);border:2px solid var(--ok);border-radius:14px;padding:22px 28px;text-align:center;flex:1\">\n                  <div style=\"font-family:var(--mono);font-size:26px;color:var(--ok);font-weight:700\">BRAIN<\u002Fdiv>\n                  <div style=\"font-size:24px;color:var(--muted);margin-top:6px\">laptop · local<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:28px;color:var(--muted);margin-bottom:16px;text-align:center;font-family:var(--mono)\">↓ responds in real time<\u002Fdiv>\n              <div style=\"display:flex;gap:16px;justify-content:center\">\n                <div style=\"display:flex;align-items:center;gap:10px;background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.3);border-radius:10px;padding:12px 20px\"><span class=\"dot d-ok\"><\u002Fspan><span style=\"font-family:var(--mono);font-size:25px;color:var(--ok)\">OK · 40%<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:10px;background:rgba(246,166,35,.1);border:1px solid rgba(246,166,35,.3);border-radius:10px;padding:12px 20px\"><span class=\"dot d-watch\"><\u002Fspan><span style=\"font-family:var(--mono);font-size:25px;color:var(--watch)\">WATCH · 65%<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:10px;background:rgba(239,93,96,.1);border:1px solid rgba(239,93,96,.3);border-radius:10px;padding:12px 20px\"><span class=\"dot d-alert\"><\u002Fspan><span style=\"font-family:var(--mono);font-size:25px;color:var(--alert)\">ALERT · 95%<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 10. STATUS -->\n    <section class=\"slide\" data-screen-label=\"10 Status\">\n      <div class=\"pad\">\n        <div class=\"head\">\n          <div class=\"kicker anim\">Honest Status<\u002Fdiv>\n          <h1 class=\"title anim\" style=\"transition-delay:80ms\">Built today, and in progress<\u002Fh1>\n        <\u002Fdiv>\n        <table class=\"tbl fill anim\" style=\"transition-delay:160ms\">\n          <tbody><tr>\n            <th style=\"color:var(--ok);font-size:28px\">Done and verified · software MVP live<\u002Fth>\n            <th style=\"color:var(--watch);font-size:28px\">Done · hardware POC<\u002Fth>\n            <th style=\"color:var(--muted);font-size:28px\">In progress · next steps<\u002Fth>\n          <\u002Ftr>\n          <tr>\n            <td style=\"font-size:27px;line-height:1.75;vertical-align:top\">\n              Four-zone mine simulator, live readings<br>\n              Real-time WebSocket at ~2 readings/sec<br>\n              Isolation Forest anomaly detection<br>\n              Safety rules: OK, WATCH, ALERT<br>\n              Ventilation-on-Demand auto fan control<br>\n              AI alert feed in plain English<br>\n              Copilot chat over live sensor data<br>\n              SQLite logging and full operator dashboard<br>\n              Live at mtrivedilu.github.io/OreAcle\n            <\u002Ftd>\n            <td style=\"font-size:27px;line-height:1.75;vertical-align:top\">\n              Pico W streams readings in OreAcle format over USB serial<br>\n              Potentiometer drives live airflow value<br>\n              Status flips OK, WATCH, ALERT from real input<br>\n              Fan response follows real-time signal<br>\n              Data contract proven real end to end\n            <\u002Ftd>\n            <td style=\"font-size:27px;line-height:1.75;vertical-align:top\">\n              DHT11 temp and humidity sensor (physical)<br>\n              MPU6050 vibration sensor (physical)<br>\n              Real DC fan motor response<br>\n              Underground-ready enclosure<br>\n              Multi-zone edge node deployment\n            <\u002Ftd>\n          <\u002Ftr>\n        <\u002Ftbody><\u002Ftable>\n        <p class=\"lead anim\" style=\"transition-delay:300ms;flex:none;margin-top:24px;font-size:30px;color:var(--muted)\">Same data contract throughout: real sensors swap in with <b style=\"color:var(--ink)\">no change<\u002Fb> to the brain or the UI.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 11. WHY IT WINS -->\n    <section class=\"slide\" data-screen-label=\"11 Why it wins\">\n      <div class=\"pad\">\n        <div class=\"head\" style=\"margin-bottom:26px\">\n          <div class=\"kicker anim\">Why It Wins<\u002Fdiv>\n          <h1 class=\"title anim\" style=\"transition-delay:80ms;font-size:72px\">Built for how this is judged<\u002Fh1>\n        <\u002Fdiv>\n        <table class=\"tbl fill anim\" style=\"transition-delay:160ms\">\n          <tbody><tr><th>Judging factor<\u002Fth><th>How OreAcle scores<\u002Fth><\u002Ftr>\n          <tr><td class=\"f\">Real problem, domain fit<\u002Ftd><td>Air quality, equipment health, ventilation cost: the three biggest daily mining pain points. Tied directly to Vale and Glencore deployments in Sudbury.<\u002Ftd><\u002Ftr>\n          <tr><td class=\"f\">Technical depth<\u002Ftd><td>Real ML anomaly detection, a real local LLM, and a closed-loop control design, integrated live. Not a mockup.<\u002Ftd><\u002Ftr>\n          <tr><td class=\"f\">AI usage<\u002Ftd><td>Two kinds: classical ML for detection, generative LLM for explanation. Open-source, offline, $0 per query.<\u002Ftd><\u002Ftr>\n          <tr><td class=\"f\">Live demo<\u002Ftd><td>Judges open the console themselves and trigger an alarm. The AI alert and fan response happen in real time.<\u002Ftd><\u002Ftr>\n          <tr><td class=\"f\">Practical UI<\u002Ftd><td>A genuinely usable, modern operator interface: the exact thing the industry currently lacks.<\u002Ftd><\u002Ftr>\n          <tr><td class=\"f\">Sponsor fit (Key Logic)<\u002Ftd><td>Software wrapped around mining hardware: Key Logic's exact business model.<\u002Ftd><\u002Ftr>\n          <tr><td class=\"f\">Cost and viability<\u002Ftd><td>$0 AI bill on hardware mines already own. Open-source, offline, named real companies, credible builder resume.<\u002Ftd><\u002Ftr>\n        <\u002Ftbody><\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 12. COMMERCIAL -->\n    <section class=\"slide\" data-screen-label=\"12 Commercial\">\n      <div class=\"pad\">\n        <div class=\"head\">\n          <div class=\"kicker anim\">Commercial Angle<\u002Fdiv>\n          <h1 class=\"title anim\" style=\"transition-delay:80ms\">$0 to run, on infrastructure they already have<\u002Fh1>\n        <\u002Fdiv>\n        <div class=\"g2 fill anim\" style=\"transition-delay:160ms;grid-template-rows:1fr 1fr\">\n          <div class=\"card\"><div class=\"ch\">$0 AI bill<\u002Fdiv><div class=\"cb\">All inference runs locally on a laptop or edge server mines already own. No API subscriptions, no usage fees, no cloud dependency.<\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><div class=\"ch\">100% offline<\u002Fdiv><div class=\"cb\">Designed for poor-connectivity environments and sensitive operational data. Works in the deepest level of the mine without a single network packet leaving site.<\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><div class=\"ch\">Open-source, vendor-neutral<\u002Fdiv><div class=\"cb\">Works across the sensors Maestro, Newtrax, and Accutron already deploy. No vendor lock-in. The brain connects to any sensor that speaks the JSON contract.<\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><div class=\"ch\">Key Logic's business<\u002Fdiv><div class=\"cb\">Software intelligence wrapped around mining hardware. OreAcle is a working proof of that model, built with modern open-source AI at hackathon speed.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card anim\" style=\"transition-delay:340ms;flex:none;margin-top:28px;background:rgba(62,207,142,.06);border-color:rgba(62,207,142,.28);padding:28px 44px\">\n          <p class=\"lead\" style=\"font-size:34px\">Everything you just saw is open-source and free to run, and it drops straight onto the sensor networks <b style=\"color:var(--ink)\">Vale and Glencore<\u002Fb> already have underground.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 13. WHO BUILT IT -->\n    <section class=\"slide\" data-screen-label=\"13 Builder\">\n      <div class=\"pad\">\n        <div class=\"head\">\n          <div class=\"kicker anim\">Who Built It<\u002Fdiv>\n          <h1 class=\"title anim\" style=\"transition-delay:80ms\">Two builders, four projects, one intersection<\u002Fh1>\n          <p class=\"sub anim\" style=\"transition-delay:140ms;font-size:36px;margin-top:12px\">Mihir Trivedi and Dhruv Devani. Each project contributed a piece of OreAcle.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"g2 fill anim\" style=\"transition-delay:200ms;grid-template-rows:1fr 1fr\">\n          <div class=\"card\" style=\"border-top:5px solid var(--info)\"><div class=\"ch\">LoopX<\u002Fdiv><div class=\"cb\">The Safe and Smart Mining Data Platform: real-time underground safety dashboards for autonomous mining equipment.<\u002Fdiv><\u002Fdiv>\n          <div class=\"card\" style=\"border-top:5px solid var(--ok)\"><div class=\"ch\">Vale (via Minax)<\u002Fdiv><div class=\"cb\">An offline-first underground inspection app, built for environments where connectivity cannot be assumed.<\u002Fdiv><\u002Fdiv>\n          <div class=\"card\" style=\"border-top:5px solid var(--brand)\"><div class=\"ch\">Laurentian MERC<\u002Fdiv><div class=\"cb\">Random Forest machine-learning research for ore characterization, published in Ore Geology Reviews. Applied ML in mining is not new to me.<\u002Fdiv><\u002Fdiv>\n          <div class=\"card\" style=\"border-top:5px solid var(--alert)\"><div class=\"ch\">Flosonics<\u002Fdiv><div class=\"cb\">An LLM assistant built over live operational data, which is exactly what the OreAcle copilot does over sensor readings.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"lead anim\" style=\"transition-delay:380ms;flex:none;margin-top:24px;font-family:var(--mono);font-size:26px;color:var(--muted)\">Built with Cursor · github.com/mtrivediLU/OreAcle<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 14. FINAL ASK -->\n    <section class=\"slide\" data-screen-label=\"14 Final ask\">\n      <div class=\"pad cx\">\n        <div class=\"kicker anim\">The Ask<\u002Fdiv>\n        <h1 class=\"title-xl anim\" style=\"transition-delay:90ms;font-size:104px;max-width:1560px;text-align:center;text-wrap:balance\">Try it. Ask me. Let's build this together.<\u002Fh1>\n        <div class=\"g3 anim\" style=\"transition-delay:200ms;margin-top:54px;width:100%\">\n          <div class=\"card\" style=\"border-top:5px solid var(--ok);text-align:left\">\n            <div class=\"num\" style=\"color:var(--ok)\">Open the console<\u002Fdiv>\n            <div class=\"ch\" style=\"font-size:32px\">Right now, on your phone<\u002Fdiv>\n            <div style=\"font-family:var(--mono);font-size:28px;color:var(--ok);font-weight:700;margin-top:12px;line-height:1.3\">mtrivedilu.github.io<br>/OreAcle/#/console<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"card\" style=\"border-top:5px solid var(--alert);text-align:left\">\n            <div class=\"num\" style=\"color:var(--alert)\">Watch the demo<\u002Fdiv>\n            <div class=\"ch\" style=\"font-size:32px\">3-minute YouTube walkthrough<\u002Fdiv>\n            <div style=\"font-family:var(--mono);font-size:28px;color:var(--alert);font-weight:700;margin-top:12px\">youtu.be/yd7dnXjNt_4<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"card\" style=\"border-top:5px solid var(--brand);text-align:left\">\n            <div class=\"num\">Talk to me<\u002Fdiv>\n            <div class=\"ch\" style=\"font-size:32px\">I know this mine<\u002Fdiv>\n            <div class=\"cb\" style=\"font-size:29px;margin-top:12px\">LoopX, Vale, Laurentian, Flosonics. OreAcle is working software, open-source, and ready for Sudbury today.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"lead anim\" style=\"transition-delay:320ms;margin-top:48px;color:var(--muted);font-size:34px\">OreAcle is <b style=\"color:var(--ink)\">working software<\u002Fb>, open-source, $0 to run, and ready for the Sudbury mining stack right now.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n\n  <div class=\"nav\">\n    <button onclick=\"{{ prev }}\" aria-label=\"Previous\">‹<\u002Fbutton>\n    <span class=\"counter\"><b id=\"curNum\">1<\u002Fb>/14<\u002Fspan>\n    <button onclick=\"{{ next }}\" aria-label=\"Next\">›<\u002Fbutton>\n    <button class=\"npill\" onclick=\"{{ toggleNotes }}\" aria-label=\"Presenter notes\">N<\u002Fbutton>\n    <a class=\"demo-btn\" href=\"https://mtrivedilu.github.io/OreAcle/#/console\" target=\"_blank\" rel=\"noopener noreferrer\">Live Demo<\u002Fa>\n  <\u002Fdiv>\n\n  <div class=\"notes\" id=\"notesPanel\">\n    <div class=\"notes-inner\">\n      <div class=\"notes-label\">Presenter notes · press N to close<\u002Fdiv>\n      <div id=\"notesBody\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount(){\n    this.slides = Array.from(document.querySelectorAll('.slide'));\n    this.total = this.slides.length;\n    this.current = 0;\n    this.notes = [\n      \"Open with the promise: free, open-source AI that watches a mine, spots danger, explains it in plain English, and acts, all offline for $0. Cursor Hackathon Sudbury, Track 03. Solo build by Mihir Trivedi. The software is live right now at mtrivedilu.github.io/OreAcle.\",\n      \"Two km down you cannot see the sky. Three quiet killers: bad air (CO and NO2 and oxygen drop), failing equipment (vibration days before failure), wasted ventilation (40% or more of the energy bill). One supervisor watches dozens of readings across many zones for a whole shift. The mine measures everything. It just does not understand, explain, or act on it fast enough.\",\n      \"Ground it in Sudbury. Maestro Vigilante AQS has run in Vale since 2015, now 70 plus mines. Creighton sits about 2,400 m deep. Newtrax and Sandvik expanded at Glencore Raglan and Kamoto Copper in July 2025. Vale IROC runs all five Ontario mines from surface: per Vale's chief ventilation engineer, VOD saves millions. Accutron MAQS too. The sensors exist. The intelligent layer on top does not.\",\n      \"Two gaps. First: the AI interpretation layer is thin. Numbers to decisions still happens in a human's head or as an expensive vendor add-on. Second: the interface is built for engineers, not the person on shift. Maestro and Newtrax have the eyes and muscles. OreAcle is the open-source, zero-cost brain and friendly face.\",\n      \"Four jobs. Sense: the Pico W reads real sensors and streams over USB. Think: Isolation Forest plus hard threshold rules catches danger. Explain: a local LLM turns each anomaly into plain-English with a recommended action. Act: Ventilation-on-Demand picks fan speed and sends it back to the board. A real closed loop.\",\n      \"One data contract end to end. Edge node to Brain to Dashboard, and the fan setpoint loops back to the board. Every stage speaks the same JSON, about two per second. That is why the simulator swaps for real sensors with no rewrite of the brain or the UI.\",\n      \"Two kinds of AI. Classical ML, Isolation Forest from scikit-learn, catches abnormal combinations no single threshold would catch. Local LLM, Llama 3.2 3B via Ollama, explains and advises in plain English and powers the copilot. Both open-source, local, $0. Offline is itself a selling point underground.\",\n      \"DEMO, 3 to 4 minutes. Open the console on your phone right now: mtrivedilu.github.io/OreAcle/#/console. I will trigger Gas Buildup: watch Zone 3 flip from green to red, CO climb to 47 ppm, the AI alert appear, and the fan go to 95%. Type into the copilot: Which zones are unsafe and why? It answers from live data, offline. You can trigger it yourself.\",\n      \"This is a real Raspberry Pi Pico W, about $10. I turn this potentiometer and you see the airflow value change live in the console. As it crosses the threshold the status flips from OK to WATCH to ALERT and the fan percentage follows. Real sensor input, real USB serial, real backend response. Physical gas sensors, a real fan motor, and the underground enclosure are next steps. The data contract is proven real today.\",\n      \"Be honest about status. Software brain is complete and live: four-zone sim, real-time WebSocket, anomaly detection, VOD, alert feed, copilot, SQLite, full dashboard on GitHub Pages. Hardware proof is done: Pico W streams in OreAcle format, potentiometer proves real sensor input drives status and fan response. Multi-sensor integration and physical fan are in progress.\",\n      \"Map straight to judging. Real problem tied to Vale and Glencore. Real ML plus real LLM plus closed loop, not slideware. Two kinds of AI. Live demo judges can open and trigger themselves. A usable UI the industry actually lacks. Key Logic's exact business model. $0 AI bill, viable today. Credible with named companies and a Sudbury mining resume.\",\n      \"$0 AI bill on hardware mines already own. Fully offline for poor connectivity and sensitive data. Open-source and vendor-neutral across Maestro, Newtrax, and Accutron sensors. That is Key Logic's exact business: software wrapped around mining hardware. It drops onto the networks Vale and Glencore already run.\",\n      \"Mihir Trivedi and Dhruv Devani. LoopX: real-time underground safety dashboards. Vale via Minax: offline-first underground inspection app. Laurentian MERC: Random Forest ML published in Ore Geology Reviews. Flosonics: LLM assistant over operational data. OreAcle is the intersection of all four, built in one hackathon with Cursor.\",\n      \"Three asks. Open the live console right now and trigger an alarm yourself. Watch the three-minute YouTube demo. And if you want to talk about what OreAcle could do for a real Sudbury mine, I am right here. Working software, open-source, ready today.\"\n    ];\n    this._key = (e) => {\n      const k = e.key;\n      if(k==='ArrowRight'||k==='PageDown'||k===' '){e.preventDefault();this.go(this.current+1);}\n      else if(k==='ArrowLeft'||k==='PageUp'){e.preventDefault();this.go(this.current-1);}\n      else if(k==='n'||k==='N'){this.toggleNotes();}\n      else if(k==='Home'){e.preventDefault();this.go(0);}\n      else if(k==='End'){e.preventDefault();this.go(this.total-1);}\n    };\n    this._resize = () => this.fit();\n    window.addEventListener('keydown', this._key);\n    window.addEventListener('resize', this._resize);\n    this.fit();\n    this.go(0);\n  }\n  componentWillUnmount(){\n    window.removeEventListener('keydown', this._key);\n    window.removeEventListener('resize', this._resize);\n  }\n  fit(){\n    const s = document.getElementById('stage');\n    if(!s) return;\n    s.style.zoom = Math.min(window.innerWidth/1920, window.innerHeight/1080);\n  }\n  go(n){\n    n = Math.max(0, Math.min(this.total-1, n));\n    this.current = n;\n    this.slides.forEach((el,i) => el.classList.toggle('active', i===n));\n    const c = document.getElementById('curNum'); if(c) c.textContent = n+1;\n    const p = document.getElementById('progFill'); if(p) p.style.width = ((n+1)/this.total*100)+'%';\n    const b = document.getElementById('notesBody'); if(b) b.textContent = this.notes[n]||'';\n  }\n  toggleNotes(){\n    const p = document.getElementById('notesPanel'); if(p) p.classList.toggle('open');\n  }\n  renderVals(){\n    return {\n      next: () => this.go(this.current+1),\n      prev: () => this.go(this.current-1),\n      toggleNotes: () => this.toggleNotes(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
